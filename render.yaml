services:
  - type: web
    name: resume-parser-api
    env: docker
    rootDir: backend
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        fromDatabase:
          name: resume-parser-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: UPLOAD_DIR
        value: /app/uploads
      - key: SEED_DEMO_USERS
        value: false
    disk:
      name: resume-parser-uploads
      mountPath: /app/uploads
      sizeGB: 1

  - type: web
    name: resume-parser-web
    env: docker
    rootDir: frontend
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: API_URL
        sync: false

databases:
  - name: resume-parser-db
    plan: starter
    databaseName: resume_parser
    user: resume_user
